<head>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>

<div id="ventana-instalacion" style="background-color: #000; color: #D4AF37; border: 2px solid #D4AF37; padding: 20px; text-align: center; font-family: Arial;">
    <img src="icon.png" style="width: 80px; border-radius: 15px;">
    <p>¿Quieres descargar nuestra Apple para tener acceso directo al Mercedes 124?</p>
    <button onclick="instalarApp()" style="background-color: #D4AF37; color: #000; padding: 10px 20px; font-weight: bold; border: none; margin: 5px;">ACEPTO</button>
    <button onclick="cerrarVentana()" style="background-color: #333; color: #fff; padding: 10px 20px; border: none; margin: 5px;">NO ACEPTO</button>
</div>

<script>
function cerrarVentana() {
    document.getElementById('ventana-instalacion').style.display = 'none';
}
function instalarApp() {
    // Aquí el sistema pide el permiso oficial al teléfono
    alert("Iniciando descarga... El icono aparecerá en tu pantalla de inicio.");
    cerrarVentana();
}
</script>
