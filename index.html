<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Link Service 178</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #000000; color: #FFFFFF; font-family: Arial, sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        img { width: 150px; margin-bottom: 20px; }
        h1 { color: #D4AF37; font-size: 24px; }
        .buttons { margin-top: 30px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 10px; font-weight: bold; }
        .btn-yes { background-color: #D4AF37; color: #000000; }
        .btn-no { background-color: #333333; color: #FFFFFF; }
    </style>
</head>
<body>

    <img src="logo.png" alt="Logo Taxi Link">
    <h1>BIENVENIDOS / WELCOME</h1>
    <p>Descarga nuestra Apple Oficial totalmente gratuita</p>
    <p><i>Twenty cow free - Instalar Yes Now</i></p>

    <div class="buttons">
        <button class="btn-yes" onclick="btnYes()">YES</button>
        <button class="btn-no" onclick="btnNo()">NO</button>
    </div>

    <script>
        let deferredPrompt;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function btnYes() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                });
            } else {
                alert("Para instalar en tu Xiaomi:\n1. Pulsa los 3 PUNTITOS de arriba.\n2. Dale a 'Instalar aplicación' o 'Añadir a pantalla de inicio'.");
            }
        }

        function btnNo() {
            window.location.href = "https://sites.google.com/view/taxi-link-service/p%C3%A1gina-principal";
        }
    </script>
</body>
</html>
