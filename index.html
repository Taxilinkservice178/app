<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Link Service</title>
    <style>
        body { background-color: #000000; color: #D4AF37; text-align: center; font-family: 'Georgia', serif; padding: 20px; margin: 0; }
        .contenedor { max-width: 450px; margin: auto; border: 2px solid #D4AF37; padding: 25px; border-radius: 30px; background-color: #0a0a0a; box-shadow: 0px 0px 20px rgba(212, 175, 55, 0.2); }
        /* Tu logo personalizado */
        .logo-oficial { width: 100%; max-width: 300px; height: auto; border-radius: 20px; margin-bottom: 20px; }
        h1 { font-size: 22px; margin-top: 10px; font-style: italic; color: #D4AF37; }
        p { font-size: 18px; color: #ffffff; line-height: 1.5; margin: 20px 0; }
        .boton { background: linear-gradient(145deg, #D4AF37, #b8860b); color: black; padding: 18px 30px; text-decoration: none; font-weight: bold; border-radius: 15px; display: inline-block; font-size: 16px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="https://i.postimg.cc/8P8Xp8Z8/logo-dorado.png" class="logo-oficial" alt="Taxi Link Service Logo">
        
        <h1>"No solo realices un viaje, vive la experiencia"</h1>
        
        <p>Usted ya está en el Mercedes 124, ahora viva la experiencia completa.</p>
        
        <div class="boton">Instalar App Taxi Link Service</div>
    </div>
</body>
</html>
