[16:33, 7/3/2026] José Luis: <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Link Service 178</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #000000;
            color: #D4AF37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
        }
        .container { padding: 20px; }
        img {
            max-width: 200px;
            margin-bottom: 20px;
            border-radius: 15px;
        }
        #install-banner {
            display: none;
            background: #1a1a1a;
            padding: 20px;
            border: 2px solid #D4AF37;
            border-radius: 15px;
            position: fixed;
            bottom: 20px;
            width: 80%;
            max-width: 400px;
        }
        .btn {
            background-color: #D4AF37;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }
        .progress-container {
            width: 100%;
            background-color: #333;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 10px;
            background-color: #D4AF37;
            border-radius: 10px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Taxi 178">
        <h1 id="txt-bienvenida"></h1>
        <p id="txt-slogan"></p>
    </div>

    <div id="install-banner">
        <p id="txt-pregunta"></p>
        <button class="btn" id="btn-si"></button>
        <button class="btn" id="btn-no" onclick="document.getElementById('install-banner').style.display='none'"></button>
        
        <div class="progress-container" id="progreso-box">
            <div class="progress-bar" id="barra"></div>
        </div>
    </div>

    <script>
        const textos = {
            es: {
                bienvenida: "BIENVENIDO",
                slogan: "La elegancia del pasado con la tecnología del futuro",
                pregunta: "¿Quieres descargar la Apple de Taxi 178?",
                si: "SÍ", no: "NO"
            },
            en: {
                bienvenida: "WELCOME",
                slogan: "The elegance of the past with the technology of the future",
                pregunta: "Do you want to download the Taxi 178 Apple?",
                si: "YES", no: "NO"
            },
            de: {
                bienvenida: "WILLKOMMEN",
                slogan: "Wir verbinden la Eleganz der Vergangenheit mit der Technologie der Zukunft",
                pregunta: "Möchten Sie die Taxi 178 Apple herunterladen?",
                si: "JA", no: "NEIN"
            }
        };

        const lang = navigator.language.startsWith('de') ? textos.de : (navigator.language.startsWith('en') ? textos.en : textos.es);

        document.getElementById('txt-bienvenida').innerText = lang.bienvenida;
        document.getElementById('txt-slogan').innerText = lang.slogan;
        document.getElementById('txt-pregunta').innerText = lang.pregunta;
        document.getElementById('btn-si').innerText = lang.si;
        document.getElementById('btn-no').innerText = lang.no;

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        document.getElementById('btn-si').addEventListener('click', async () => {
            if (deferredPrompt) {
                // Simulación de barra de descarga
                document.getElementById('progreso-box').style.display = 'block';
                let width = 0;
                let interval = setInterval(async () => {
                    if (width >= 100) {
                        clearInterval(interval);
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        document.getElementById('install-banner').style.display = 'none';
                    } else {
                        width += 10;
                        document.getElementById('barra').style.width = width + '%';
                    }
                }, 200);
            }  
        });
    </script>
</body>
</html>
