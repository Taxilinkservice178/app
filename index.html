<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Link Service | Luxury Experience</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .container { padding: 20px; }
        .logo-img { max-width: 180px; margin-bottom: 20px; }
        .oro { color: #D4AF37; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 1.1rem; margin-bottom: 20px; opacity: 0.9; }
        
        .btn-yes { 
            background-color: #D4AF37; 
            color: #000; 
            border: none; 
            padding: 18px 60px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            margin-bottom: 20px; 
            width: 260px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        
        .btn-no { 
            background-color: transparent; 
            color: #888; 
            border: 1px solid #444; 
            padding: 12px 40px; 
            font-size: 1rem; 
            border-radius: 50px; 
            cursor: pointer; 
            width: 200px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Taxi Link Logo" class="logo-img">
        
        <h1 id="txtWelcome">Bienvenidos / Welcome</h1>
        <p id="txtDesc">Descarga nuestra App oficial</p>
        <p class="oro" id="txtFree">TOTALMENTE GRATUITA / TOTALLY FREE</p>

        <button class="btn-yes" onclick="btnYes()">INSTALAR / YES</button><br>
        <button class="btn-no" onclick="btnNo()">NO</button>
    </div>

    <script>
        // 1. REGISTRO DEL PUENTE (SERVICE WORKER) PARA QUE SEA APP
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        // 2. LÓGICA DE IDIOMA
        const userLang = navigator.language || navigator.userLanguage;
        if (!userLang.includes('es')) {
            document.getElementById('txtWelcome').innerText = "Welcome";
            document.getElementById('txtDesc').innerText = "Download our official App";
            document.getElementById('txtFree').innerText = "TOTALLY FREE";
        }

        // 3. FUNCIONES DE LOS BOTONES
        function btnNo() {
            window.location.href = "https://sites.google.com/view/taxi-link-service/página-principal";
        }

        function btnYes() {
            // Esta función activa la instalación en móviles compatibles
            alert("Pulsa en 'Añadir a pantalla de inicio' para instalar tu App de Taxi Link");
        }
    </script>
</body>
</html>
